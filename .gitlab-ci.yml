stages:
  - test
  - build
  - hil

default:
  tags:
    - docker

variables:
  DEBIAN_FRONTEND: noninteractive

before_script:
  - apt-get update
  - apt-get install -y --no-install-recommends build-essential libc6-dev make gcc gcc-avr avr-libc binutils-avr

unit_tests:
  stage: test
  image: debian:bookworm-slim
  script:
    - make test

build_firmware:
  stage: build
  image: debian:bookworm-slim
  script:
    - make avr
  artifacts:
    paths:
      - build/uart_keyboard.elf
      - build/uart_keyboard.hex
    expire_in: 1 week

hil_smoke:
  stage: hil
  image: python:3.11-slim
  tags:
    - hil
  when: manual
  allow_failure: true
  script:
    - pip install --no-cache-dir pyserial
    - python hil/tests/hil_smoke.py
  artifacts:
    when: always
    paths:
      - hil/artifacts/
    expire_in: 1 week
